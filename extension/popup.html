<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>AutoStore in Chrome</title>
  <style>
    body { font: 13px/1.4 -apple-system, system-ui, sans-serif; width: 320px; padding: 14px; margin: 0; color: #222; }
    h1 { font-size: 14px; margin: 0 0 10px; }
    label { display: block; margin-top: 10px; font-weight: 600; }
    input { width: 100%; box-sizing: border-box; padding: 6px 8px; font: 12px/1.3 ui-monospace, SFMono-Regular, monospace; border: 1px solid #ccc; border-radius: 4px; }
    button { margin-top: 12px; width: 100%; padding: 8px 10px; border: 0; background: #1db954; color: white; font-weight: 600; border-radius: 4px; cursor: pointer; }
    button.secondary { background: #888; }
    .status { margin-top: 10px; padding: 8px 10px; background: #f4f4f4; border-radius: 4px; font-family: ui-monospace, monospace; font-size: 11px; }
    .hint { color: #666; font-size: 11px; margin-top: 6px; }
  </style>
</head>
<body>
  <h1>AutoStore in Chrome</h1>

  <label for="token">Bridge token</label>
  <input id="token" placeholder="paste from ~/.autostore-in-chrome/token" autocomplete="off" spellcheck="false" />
  <div class="hint">
    Get the token by running <code>cat ~/.autostore-in-chrome/token</code> in a terminal on this machine,
    or copy it from the AutoStore Mac app.
  </div>

  <label for="port">Port</label>
  <input id="port" placeholder="43117" inputmode="numeric" />

  <button id="save">Save &amp; connect</button>
  <button id="clear" class="secondary">Disconnect</button>

  <div class="status" id="status">…</div>

  <script src="popup.js"></script>
</body>
</html>
