<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>AutoStore in Chrome</title>
  <style>
    body { font: 13px/1.4 -apple-system, system-ui, sans-serif; width: 320px; padding: 14px; margin: 0; color: #222; }
    h1 { font-size: 14px; margin: 0 0 4px; }
    .subtitle { color: #666; font-size: 11px; margin: 0 0 14px; }
    label { display: block; margin-top: 10px; font-weight: 600; font-size: 12px; }
    input { width: 100%; box-sizing: border-box; padding: 7px 9px; font: 13px system-ui; border: 1px solid #ccc; border-radius: 5px; margin-top: 3px; }
    input:focus { outline: none; border-color: #1db954; box-shadow: 0 0 0 2px rgba(29,185,84,.15); }
    button#login { margin-top: 14px; width: 100%; padding: 9px 10px; border: 0; background: #1db954; color: white; font-weight: 600; font-size: 13px; border-radius: 5px; cursor: pointer; }
    button#login:hover { background: #17a349; }
    button#login:disabled { background: #aaa; cursor: default; }
    button#logout { margin-top: 8px; width: 100%; padding: 7px 10px; border: 1px solid #ddd; background: #fff; color: #555; font-size: 12px; border-radius: 5px; cursor: pointer; }
    button#logout:hover { background: #f5f5f5; }
    .status { margin-top: 12px; padding: 9px 11px; border-radius: 5px; font-size: 12px; line-height: 1.5; }
    .status.ok   { background: #edfbf2; color: #1a6e38; border: 1px solid #b0e8c5; }
    .status.warn { background: #fff8e1; color: #7a5c00; border: 1px solid #ffe082; }
    .status.err  { background: #fff0f0; color: #c00; border: 1px solid #ffcdd2; }
    .user-badge { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; padding: 8px 10px; background: #f9f9f9; border-radius: 5px; border: 1px solid #eee; }
    .user-badge .avatar { width: 28px; height: 28px; border-radius: 50%; background: #1db954; color: white; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; flex-shrink: 0; }
    .user-badge .info { font-size: 12px; line-height: 1.4; }
    .user-badge .email { color: #888; font-size: 11px; }
    .advanced-toggle { font-size: 11px; color: #999; cursor: pointer; text-align: right; margin-top: 6px; }
    .advanced-toggle:hover { color: #555; }
    .advanced { display: none; }
    .advanced.visible { display: block; }
    .error-msg { color: #c00; font-size: 12px; margin-top: 6px; }
  </style>
</head>
<body>
  <h1>AutoStore in Chrome</h1>
  <p class="subtitle">Connect to your AutoStore account to enable browser control.</p>

  <!-- LOGGED-OUT STATE -->
  <div id="login-section">
    <label for="email">Email</label>
    <input id="email" type="email" placeholder="your@email.com" autocomplete="email" />

    <label for="password">Password</label>
    <input id="password" type="password" placeholder="••••••••" autocomplete="current-password" />

    <div class="advanced-toggle" id="advanced-toggle">Advanced ▸</div>
    <div class="advanced" id="advanced-section">
      <label for="backend-url">AutoStore server URL</label>
      <input id="backend-url" placeholder="https://api.spriterock.com" />
    </div>

    <div class="error-msg" id="error-msg"></div>
    <button id="login">Sign in</button>
  </div>

  <!-- LOGGED-IN STATE -->
  <div id="logged-in-section" style="display:none">
    <div class="user-badge">
      <div class="avatar" id="avatar-initial">A</div>
      <div class="info">
        <div id="user-name">—</div>
        <div class="email" id="user-email">—</div>
      </div>
    </div>
    <button id="logout">Sign out</button>
  </div>

  <div class="status" id="status">Checking connection…</div>

  <script src="popup.js"></script>
</body>
</html>
